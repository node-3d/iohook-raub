name: Test
defaults:
  run:
    shell: bash

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  unit-tests:
    name: Unit Tests
    strategy:
        matrix:
          os: [ubuntu-22.04, windows-2022, macos-12, macos-14]

    runs-on: ${{ matrix.os }}

    steps:

      - name: Fetch Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          cache: 'npm'

      - name: Install Modules
        run: npm ci

      - name: Fix Python
        if: matrix.os == 'macos-12' || matrix.os == 'macos-14'
        run: pip install setuptools

      - name: Install dependency - Linux
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq libxtst-dev libxt-dev libxinerama-dev libx11-xcb-dev libxkbcommon-dev libxkbcommon-x11-dev

      - name: Build Current Binary
        run: npm run build:rebuild

      - name: Run Unit Tests - Linux
        if: matrix.os == 'ubuntu-22.04'
        run: xvfb-run --auto-servernum npm run test:ci

      - name: Run Unit Tests - Windows
        if: matrix.os == 'windows-2022'
        run: npm run test:ci
